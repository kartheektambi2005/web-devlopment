<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="ha-rotateSection">
        <div class="ha-rotateWrapper">
            <div class="ha-rotateCarousel">
                <button type="button" class="ha-rotateCard" style="transform: rotateY(0deg) translateZ(280px);">
                    <div class="ha-rotateCardInner">
                        <div class="ha-rotateImgWrap"
                            <img alt="Smart Home Automation System" class="ha-rotateImg" src="assets/video-bg.jpg">
                        </div>
                        <h3 class="ha-rotateTitle">Institute</h3>
                    </div>
                </button>
                <button type="button" class="ha-rotateCard" style="transform: rotateY(60deg) translateZ(280px);">
                    <div class="ha-rotateCardInner">
                        <div class="ha-rotateImgWrap">
                            <img alt="Intelligent Security &amp; Surveillance Systems" class="ha-rotateImg" src="assets/property-02.jpg">
                        </div>
                        <h3 class="ha-rotateTitle">pent house</h3>
                    </div>
                </button>
                <button type="button" class="ha-rotateCard" style="transform: rotateY(120deg) translateZ(280px);">
                    <div class="ha-rotateCardInner">
                        <div class="ha-rotateImgWrap">
                            <img alt="Climate Control (Ventilation Automation)" class="ha-rotateImg" src="assets/property-03.jpg">
                        </div>
                        <h3 class="ha-rotateTitle">apartment</h3>
                    </div>
                </button>
                <button type="button" class="ha-rotateCard" style="transform: rotateY(180deg) translateZ(280px);">
                    <div class="ha-rotateCardInner">
                        <div class="ha-rotateImgWrap">
                            <img alt="Energy Usage Monitoring &amp; Optimization" class="ha-rotateImg" src="assets/property-04.jpg">
                        </div>
                        <h3 class="ha-rotateTitle">duplex</h3>
                    </div>
                </button>
                <button type="button" class="ha-rotateCard" style="transform: rotateY(240deg) translateZ(280px);">
                    <div class="ha-rotateCardInner">
                        <div class="ha-rotateImgWrap">
                            <img alt="Motorized Curtain &amp; Appliance Automation" class="ha-rotateImg" src="assets/property-05.jpg">
                        </div>
                        <h3 class="ha-rotateTitle">villa</h3>
                    </div>
                </button>
                <button type="button" class="ha-rotateCard" style="transform: rotateY(300deg) translateZ(280px);">
                    <div class="ha-rotateCardInner">
                        <div class="ha-rotateImgWrap">
                            <img alt="Home Theatre &amp; Entertainment Automation" class="ha-rotateImg" src="assets/property-06.jpg">
                        </div>
                        <h3 class="ha-rotateTitle">MongoDB</h3>
                    </div>
                </button>
            </div>
        </div>
    </section>
</body>
</html>
